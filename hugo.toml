
baseURL = "https://docs.nxthdr.dev/"
title = "nxthdr"
theme = "hextra"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

  [markup.highlight]
    noClasses = false

# LLM-friendly output (hextra >= 0.12): /llms.txt index + per-page raw markdown.
[outputs]
  home = ["HTML", "RSS", "llms"]
  section = ["HTML", "RSS", "markdown"]
  page = ["HTML", "markdown"]


[[menu.main]]
  name = "Search"
  weight = 1
  [menu.main.params]
    type = "search"

[[menu.main]]
  name = "GitHub"
  weight = 2
  url = "https://github.com/nxthdr/"
  [menu.main.params]
    icon = "github"

[[menu.main]]
  name = "Chat"
  weight = 3
  url = "https://chat.nxthdr.dev"
  [menu.main.params]
    icon = "chat"

[params]
  description = "Open Infrastructure for Internet Experimentation"

  [params.navbar]
    displayTitle = true
    displayLogo = false

  [params.navbar.logo]
    link = "/docs/"

  [params.footer]
    displayCopyright = false
    displayPoweredBy = false

  [params.editURL]
    enable = true
    base = "https://github.com/nxthdr/docs/edit/main/content"
